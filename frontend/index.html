<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Nounkoun</title><style>body{font-family:sans-serif;background:#f0fdf4;padding:20px} .card{background:white;padding:20px;border-radius:15px;box-shadow:0 4px 10px #0001} button{background:#16a34a;color:white;padding:15px;width:100%;border:0;border-radius:10px;font-size:18px;font-weight:bold} input{width:100%;margin:10px 0}</style></head><body><div class="card"><h1>🌱 Nounkoun IA - Abomey-Calavi</h1><p>Prends la photo de ta plante malade</p><input type="file" id="photo" accept="image/*"><button onclick="diag()">DIAGNOSTIQUER - 0 FCFA</button><div id="res" style="margin-top:20px"></div></div><script>async function diag(){const f=document.getElementById('photo').files[0];if(!f){alert('Choisis photo');return}document.getElementById('res').innerHTML='Analyse... 5s';let fd=new FormData();fd.append('photo',f);fd.append('loc','Abomey-Calavi');let r=await fetch('/diagnostiquer',{method:'POST',body:fd});let j=await r.json();document.getElementById('res').innerHTML='<pre>'+j+'</pre>'} </script></body></html>
